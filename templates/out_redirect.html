<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Store fallback URL in sessionStorage
        sessionStorage.setItem('seo_fallback_url', "{{ fallback_url }}");
        // Redirect to smartlink after short delay
        setTimeout(function() {
            window.location.replace("{{ smart_url }}");
        }, 800);
        // On back, redirect to fallback
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                var fallback = sessionStorage.getItem('seo_fallback_url');
                if (fallback) {
                    sessionStorage.removeItem('seo_fallback_url');
                    window.location.replace(fallback);
                }
            }
        });
    </script>
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #f8f9fa; }
        .redirect-box { background: #fff; padding: 2rem 2.5rem; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); text-align: center; }
        .spinner { margin: 1.5rem auto 0; width: 40px; height: 40px; border: 4px solid #007bff33; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h2>Redirecting to offer...</h2>
        <div class="spinner"></div>
        <p style="margin-top:1.5rem; color:#888; font-size:1rem;">Please wait, you will be redirected shortly.<br>If not, <a href="{{ smart_url }}">click here</a>.</p>
    </div>
</body>
</html>
